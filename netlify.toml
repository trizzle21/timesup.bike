# Netlify configuration

[build]
  command = "npx tinacms build --local --skip-cloud-checks && astro build"
  publish = "dist"

[dev]
  command = "npm run dev:tina"
  targetPort = 4321

# Edge Functions configuration
[[edge_functions]]
  function = "chart-data"
  path = "/api/chart-data"

# Pretty URLs off — match Astro's trailingSlash: 'never'
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = false

# Headers for static assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
